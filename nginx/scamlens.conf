# /etc/nginx/sites-available/scamlens.conf
# Installed by scripts/setup_vps.sh. Placeholders ${DOMAIN} / ${DNS_HOSTNAME}
# are expanded by envsubst before nginx reload.

# --- HTTP → HTTPS redirect (both hostnames) ---
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN} ${DNS_HOSTNAME};

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Default HTTP vhost: serves the block page for anything else ---
# Clients that have had a scam domain resolved to this IP land here on
# port 80. The document request is rewritten to /block, but static asset
# paths (_next, favicon, public/) pass through unchanged so CSS and
# images load. The original Host is forwarded so the block page can
# render the attempted domain.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Pass Next.js assets through unchanged.
    location ^~ /_next/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /favicon.ico {
        proxy_pass http://127.0.0.1:3000/favicon.ico;
        proxy_set_header Host $host;
    }

    location ^~ /setup/ {
        # Public screenshots under public/setup/ — pass through.
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Everything else → the block page.
    location / {
        proxy_pass http://127.0.0.1:3000/block;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- Main site + REST API ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 2m;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Next.js frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# --- DNS-over-HTTPS endpoint ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ${DNS_HOSTNAME};

    ssl_certificate     /etc/letsencrypt/live/${DNS_HOSTNAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DNS_HOSTNAME}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location = /dns-query {
        proxy_pass http://127.0.0.1:8053/dns-query;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_read_timeout 15s;
    }

    location / {
        return 404;
    }
}
