services:
  postgres:
    image: postgres:16-alpine
    container_name: scamlens_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - scamlens_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scamlens_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - scamlens_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  dns_server:
    build:
      context: .
      dockerfile: dns_server/Dockerfile
    container_name: scamlens_dns
    restart: unless-stopped
    env_file: .env
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "127.0.0.1:8053:8053"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scamlens_net

  ai_scanner:
    build:
      context: .
      dockerfile: ai_scanner/Dockerfile
    container_name: scamlens_scanner
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - scamlens_net
    shm_size: "1gb"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: scamlens_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - scamlens_net

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: scamlens_frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api
    networks:
      - scamlens_net

networks:
  scamlens_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
